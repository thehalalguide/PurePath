<!DOCTYPE html>
<html lang="en" dir="ltr" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PurePath | The Halal Guide</title>
   <link href="style.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', 'Noto Sans Arabic', sans-serif; transition: all 0.3s ease; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .card-anim { transition: transform 0.3s ease, box-shadow 0.3s ease; height: 100%; }
        .card-anim:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        input::placeholder { color: #94a3b8; opacity: 1; }
        /* Generic fix for any element with a left border */
[dir="rtl"] .source-card, 
[dir="rtl"] .prep-box, 
[dir="rtl"] .finance-alert, 
[dir="rtl"] .growth-box,
[dir="rtl"] .travel-box {
    border-left-width: 0;
    border-right-width: 4px;
}

/* Specific fix for the "Essential Guides" section title (Image 2) */
[dir="rtl"] #section-title {
    border-left-width: 0;
    border-right-width: 4px;
    padding-left: 0;
    padding-right: 1rem; /* Adjust padding to the right side */
}

/* Fix for the card inner borders (Image 1) */
[dir="rtl"] .old-way, [dir="rtl"] .new-way {
    border-left-width: 0;
    border-right-width: 4px;
}
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen">

    <nav class="p-5 flex justify-between items-center glass sticky top-0 z-50 shadow-sm border-b border-emerald-100">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-emerald-600 rounded-2xl flex items-center justify-center text-white shadow-lg overflow-hidden">
                <img src="images/logo.jpg" alt="P" onerror="this.style.display='none'; this.parentNode.innerHTML='P'" class="w-full h-full object-cover">
            </div>
            <div>
                <span class="text-2xl font-extrabold text-emerald-800 block leading-none">PurePath</span>
                <span id="nav-tagline" class="text-[10px] uppercase tracking-widest text-emerald-600 font-bold">The Halal Guide</span>
            </div>
        </div>
        
        <button onclick="toggleLanguage()" id="lang-btn" class="px-6 py-2 bg-emerald-800 text-white rounded-full font-bold hover:bg-emerald-700 transition active:scale-95 shadow-md">
            العربية
        </button>
    </nav>

   <header class="py-16 px-6 text-center bg-gradient-to-b from-emerald-50 to-transparent">
    <h1 id="hero-title" class="text-4xl md:text-6xl font-black text-slate-900 mb-6 leading-tight">
        Elevate Your Life <br><span class="text-emerald-600">The Pure Way</span>
    </h1>
    <p id="hero-sub" class="text-lg text-slate-600 mb-10 max-w-2xl mx-auto">Your companion for navigating modern choices with faith and clarity.</p>
    
    <div class="max-w-xl mx-auto relative group">
        <input type="text" id="main-search" onkeyup="handleSearch()" 
               spellcheck="false" 
               placeholder="Search 'E-numbers', 'Music', or 'Loans'..." 
               class="w-full p-5 rounded-2xl shadow-xl border-2 border-emerald-100 focus:border-emerald-500 outline-none text-lg transition-all pr-12 rtl:pr-5 rtl:pl-12 text-slate-900 bg-white">
        
        <div class="absolute right-5 top-5 rtl:right-auto rtl:left-5 text-emerald-500">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        </div>
    </div>
</header>

    <main class="max-w-6xl mx-auto px-6 pb-20">
        <h2 id="section-title" class="text-2xl font-bold text-slate-800 mb-8 border-l-4 border-emerald-500 pl-4">Essential Guides</h2>
        <div id="card-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <footer class="bg-emerald-900 text-white py-12 px-6 text-center">
        <p class="mb-4 font-bold text-emerald-200">PurePath © 2026</p>
        <div id="footer-links" class="flex justify-center gap-6 text-sm opacity-80">
          <a href="privacy.html" class="hover:text-emerald-400 transition-colors">Privacy</a>
          <a href="sources.html" class="hover:text-emerald-400 transition-colors">Sources</a>
          <a href="contact.html" class="hover:text-emerald-400 transition-colors">Contact</a>
        </div>
    </footer>

    <script>
    const content = {
        en: {
            navTagline: "The Halal Guide",
            heroTitle: "Elevate Your Life <br><span class='text-emerald-600'>The Pure Way</span>",
            heroSub: "Your companion for navigating modern choices with faith and clarity.",
            searchPlaceholder: "Search 'E-numbers', 'Music', or 'Loans'...",
            sectionTitle: "Essential Guides",
            footerPrivacy: "Privacy",
            footerSources: "Sources",
            footerContact: "Contact",
            noResults: 'No results found for',
            learnMore: 'Learn More →',
            cards: [
                { title: "Haram Drinks", desc: "Avoiding alcohol and doubtful beverages.", icon: "🍷", status: "Critical", link: "drinks.html" },
                { title: "Haram Foods", desc: "Guide to Gelatin, E-numbers, and Slaughter.", icon: "🥩", status: "Essential", link: "foods.html" },
                { title: "Music & Audio", desc: "Finding the balance in sound and lyrics.", icon: "🎵", status: "Mindful", link: "music.html" },
                { title: "Relationships", desc: "Boundaries in the age of social media.", icon: "💍", status: "Social", link: "relationships.html" },
                { title: "Ethical Wealth", desc: "How to avoid Riba (Interest) in banking.", icon: "💰", status: "Finance", link: "wealth.html" },
                { title: "Digital Habits", desc: "Avoiding backbiting and toxic content.", icon: "📱", status: "Daily", link: "habits.html" },
                { title: "Modest Fashion", desc: "Ethics of clothing and fair trade.", icon: "👔", status: "Style", link: "fashion.html" },
                { title: "Travel Tips", desc: "Finding Halal spots globally.", icon: "🌍", status: "Community", link: "travel.html" },
                { title: "The Halal Swap", desc: "Better alternatives for common habits.", icon: "✨", status: "Solutions", link: "swap.html" }
            ]
        },
        ar: {
            navTagline: "دليل الحلال الشامل",
            heroTitle: "ارتقِ بحياتك <br><span class='text-emerald-600'>بالطريقة النقية</span>",
            heroSub: "رفيقك لاتخاذ قراراتك اليومية بوضوح وإيمان.",
            searchPlaceholder: "ابحث عن 'جيلاتين'، 'موسيقى'، أو 'قروض'...",
            sectionTitle: "الأدلة الأساسية",
            footerPrivacy: "الخصوصية",
            footerSources: "المصادر",
            footerContact: "اتصل بنا",
            noResults: 'لا توجد نتائج لـ',
            learnMore: 'تعلم المزيد ←',
            cards: [
                { title: "المشروبات المحرمة", desc: "تجنب الكحول والمشروبات المشبوهة.", icon: "🍷", status: "ضروري", link: "drinks.html" },
                { title: "الأطعمة المحرمة", desc: "دليل الجيلاتين، الأرقام المضافة، والذبح.", icon: "🥩", status: "أساسي", link: "foods.html" },
                { title: "الموسيقى والإعلام", desc: "تحقيق التوازن في الكلمات والألحان.", icon: "🎵", status: "وعي", link: "music.html" },
                { title: "العلاقات", desc: "الحدود الشرعية في عصر التواصل الاجتماعي.", icon: "💍", status: "اجتماعي", link: "relationships.html" },
                { title: "المال الحلال", desc: "كيفية تجنب الربا في المعاملات البنكية.", icon: "💰", status: "مالي", link: "wealth.html" },
                { title: "العادات الرقمية", desc: "تجنب الغيبة والمحتوى السام.", icon: "📱", status: "يومي", link: "habits.html" },
                { title: "الأزياء المحتشمة", desc: "أخلاقيات اللباس والتجارة العادلة.", icon: "👔", status: "نمط حياة", link: "fashion.html" },
                { title: "نصائح السفر", desc: "العثور على أماكن حلال حول العالم.", icon: "🌍", status: "مجتمع", link: "travel.html" },
                { title: "البدائل الحلال", desc: "اكتشف أفضل البدائل للعادات والمنتجات.", icon: "✨", status: "حلول", link: "swap.html" }
            ]
        }
    };

    let currentLang = localStorage.getItem('preferredLang') || 'en';

    function applyLanguage(lang) {
        const html = document.getElementById('main-html');
        const btn = document.getElementById('lang-btn');
        const footerLinks = document.querySelectorAll('#footer-links a');
        const searchInput = document.getElementById('main-search');
        
        html.dir = (lang === 'ar') ? 'rtl' : 'ltr';
        btn.innerText = (lang === 'ar') ? 'English' : 'العربية';
        
        document.getElementById('nav-tagline').innerText = content[lang].navTagline;
        document.getElementById('hero-title').innerHTML = content[lang].heroTitle;
        document.getElementById('hero-sub').innerText = content[lang].heroSub;
        searchInput.placeholder = content[lang].searchPlaceholder;
        document.getElementById('section-title').innerText = content[lang].sectionTitle;

        footerLinks[0].innerText = content[lang].footerPrivacy;
        footerLinks[1].innerText = content[lang].footerSources;
        footerLinks[2].innerText = content[lang].footerContact;
        
        // Render cards based on current search value
        renderCards(searchInput.value);
    }

    function toggleLanguage() {
        currentLang = (currentLang === 'en') ? 'ar' : 'en';
        localStorage.setItem('preferredLang', currentLang);
        applyLanguage(currentLang);
    }

    function renderCards(filterText = "") {
        const container = document.getElementById('card-container');
        if (!container) return;
        
        container.innerHTML = '';
        const lowerFilter = filterText.toLowerCase().trim();
        
        const currentCards = content[currentLang].cards;
        const filtered = currentCards.filter(item => 
            item.title.toLowerCase().includes(lowerFilter) || 
            item.desc.toLowerCase().includes(lowerFilter) ||
            item.status.toLowerCase().includes(lowerFilter)
        );

        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="col-span-full text-center py-12">
                    <p class="text-slate-400 text-lg">${content[currentLang].noResults} "${filterText}"</p>
                </div>`;
            return;
        }

        filtered.forEach((item) => {
            const cardLink = document.createElement('a');
            cardLink.href = item.link;
            cardLink.className = "block no-underline h-full";
            
            const isSwap = item.icon === "✨";
            const bgClass = isSwap ? "bg-emerald-50 border-emerald-200" : "bg-white border-emerald-50";

            cardLink.innerHTML = `
                <div class="card-anim ${bgClass} p-8 rounded-[2rem] border shadow-sm flex flex-col items-start gap-4 cursor-pointer h-full">
                    <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center text-3xl shadow-inner border border-slate-50">${item.icon}</div>
                    <span class="px-3 py-1 bg-emerald-100 text-emerald-700 text-[10px] font-bold uppercase rounded-full tracking-wider">${item.status}</span>
                    <h3 class="text-xl font-bold text-slate-800">${item.title}</h3>
                    <p class="text-sm text-slate-500 leading-relaxed">${item.desc}</p>
                    <div class="mt-auto pt-4 text-emerald-600 font-bold text-sm flex items-center gap-2">
                        ${content[currentLang].learnMore}
                    </div>
                </div>
            `;
            container.appendChild(cardLink);
        });
    }

    // Fixed handleSearch to be more responsive
    function handleSearch() {
        const query = document.getElementById('main-search').value;
        renderCards(query);
    }

    window.onload = function() {
        applyLanguage(currentLang);
    };
</script>
</body>
</html>
