<!DOCTYPE html>
<html lang="en" dir="ltr" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | PurePath Guide</title>
  <link href="style.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', 'Noto Sans Arabic', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .input-field { border: 1px solid #e2e8f0; transition: all 0.3s ease; }
        .input-field:focus { border-color: #10b981; outline: none; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1); }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen">

    <nav class="p-5 glass sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-emerald-800 font-bold">
                ← <span id="back-btn">Back to Home</span>
            </a>
            <button onclick="toggleLanguage()" id="lang-btn" class="text-sm font-bold text-emerald-700">العربية</button>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto px-6 py-12">
        <div class="text-center mb-12">
            <div class="w-20 h-20 bg-white rounded-3xl flex items-center justify-center text-5xl shadow-sm mx-auto mb-4">✉️</div>
            <h1 id="page-title" class="text-4xl font-black text-slate-900 mb-2">Get in Touch</h1>
            <p id="page-subtitle" class="text-slate-500 italic">Have questions or suggestions? We'd love to hear from you.</p>
        </div>

        <form class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 space-y-6">
            <div>
                <label id="name-label" class="block text-sm font-bold text-slate-700 mb-2">Full Name</label>
                <input type="text" class="w-full p-4 rounded-xl input-field bg-slate-50" placeholder="Enter your name">
            </div>
            <div>
                <label id="email-label" class="block text-sm font-bold text-slate-700 mb-2">Email Address</label>
                <input type="email" class="w-full p-4 rounded-xl input-field bg-slate-50" placeholder="email@example.com">
            </div>
            <div>
                <label id="msg-label" class="block text-sm font-bold text-slate-700 mb-2">Message</label>
                <textarea rows="4" class="w-full p-4 rounded-xl input-field bg-slate-50" placeholder="How can we help?"></textarea>
            </div>
            <button id="submit-btn" type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl transition-colors shadow-lg shadow-emerald-100">
                Send Message
            </button>
        </form>
    </main>

 <script>
    const content = {
        en: {
            back: "Back to Home",
            title: "Get in Touch",
            subtitle: "Have questions or suggestions? We'd love to hear from you.",
            nameLabel: "Full Name",
            namePlace: "Enter your name",
            emailLabel: "Email Address",
            emailPlace: "email@example.com",
            msgLabel: "Message",
            msgPlace: "How can we help?",
            submit: "Send Message"
        },
        ar: {
            back: "العودة للرئيسية",
            title: "تواصل معنا",
            subtitle: "لديك أسئلة أو اقتراحات؟ يسعدنا سماع رأيك.",
            nameLabel: "الاسم الكامل",
            namePlace: "أدخل اسمك",
            emailLabel: "البريد الإلكتروني",
            emailPlace: "email@example.com",
            msgLabel: "الرسالة",
            msgPlace: "كيف يمكننا مساعدتك؟",
            submit: "إرسال الرسالة"
        }
    };

    // 1. Initialize currentLang from storage or default to English
    let currentLang = localStorage.getItem('preferredLang') || 'en';

    // 2. The unified apply function
    function applyLanguage(lang) {
        const html = document.getElementById('main-html');
        const btn = document.getElementById('lang-btn');
        
        // Switch Layout Direction
        html.dir = (lang === 'ar') ? 'rtl' : 'ltr';
        btn.innerText = (lang === 'ar') ? 'English' : 'العربية';

        // Update Text Elements
        document.getElementById('back-btn').innerText = content[lang].back;
        document.getElementById('page-title').innerText = content[lang].title;
        document.getElementById('page-subtitle').innerText = content[lang].subtitle;
        document.getElementById('name-label').innerText = content[lang].nameLabel;
        document.getElementById('email-label').innerText = content[lang].emailLabel;
        document.getElementById('msg-label').innerText = content[lang].msgLabel;
        document.getElementById('submit-btn').innerText = content[lang].submit;

        // Update Input Placeholders
        const inputs = document.querySelectorAll('input, textarea');
        inputs[0].placeholder = content[lang].namePlace;
        inputs[1].placeholder = content[lang].emailPlace;
        inputs[2].placeholder = content[lang].msgPlace;
    }

    // 3. Toggle function to sync with storage
    function toggleLanguage() {
        currentLang = (currentLang === 'en') ? 'ar' : 'en';
        localStorage.setItem('preferredLang', currentLang); 
        applyLanguage(currentLang);
    }

    // 4. Apply the saved language immediately on load
    window.onload = function() {
        applyLanguage(currentLang);
    };
</script>
</body>
</html>
